<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gun.js graph explorer</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="explorer-body">
    <div class="explorer-shell">
        <header class="explorer-topbar">
            <div>
                <a href="/" class="explorer-back">← peer dashboard</a>
                <h1>graph explorer</h1>
            </div>
            <div class="explorer-actions">
                <button id="fitBtn" type="button">fit graph</button>
                <button id="refreshBtn" type="button">refresh</button>
                <span id="peerStatus" class="explorer-peer">connecting</span>
            </div>
        </header>

        <main class="explorer-main">
            <aside class="explorer-sidebar">
                <label for="searchInput">nodes <span id="nodeCount"></span></label>
                <input id="searchInput" type="search" placeholder="search soul or content…" autocomplete="off" spellcheck="false">
                <div id="nodeList" class="explorer-node-list" role="list"></div>
            </aside>

            <section class="explorer-stage" aria-label="Interactive graph">
                <canvas id="graphCanvas" tabindex="0" aria-label="Gun graph. Use the node list to navigate accessibly."></canvas>
                <div class="explorer-legend" aria-hidden="true">
                    <span><i class="legend-node"></i>stored node</span>
                    <span><i class="legend-node legend-node--ghost"></i>missing target</span>
                    <span><i class="legend-edge"></i>gun reference</span>
                </div>
                <p id="emptyState" class="explorer-empty" hidden></p>
                <div id="graphTooltip" class="explorer-tooltip" hidden></div>
            </section>

            <aside class="explorer-inspector" aria-live="polite">
                <div id="inspectorEmpty" class="explorer-inspector-empty">
                    <span>node inspector</span>
                    select a node to inspect its data
                </div>
                <div id="inspectorContent" hidden>
                    <div class="explorer-inspector-head">
                        <span id="inspectorKind">node</span>
                        <div>
                            <button id="closeInspectorBtn" class="explorer-close" type="button">close</button>
                            <button id="copySoulBtn" type="button">copy soul</button>
                        </div>
                    </div>
                    <h2 id="inspectorLabel"></h2>
                    <p id="inspectorSoul"></p>
                    <p id="inspectorMeta"></p>
                    <div id="inspectorFields"></div>
                    <details class="explorer-raw">
                        <summary>raw gun node</summary>
                        <pre id="inspectorRaw"></pre>
                    </details>
                </div>
            </aside>
        </main>

        <footer id="statusBar" class="explorer-status">loading graph…</footer>
    </div>

    <script src="/theme.js"></script>
    <script type="module" src="/explorer.js"></script>
</body>
</html>
