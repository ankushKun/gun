<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gun.js stats</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-row">
                <h1>gun.js peer</h1>
                <span id="statusText">offline</span>
            </div>
            <div class="live-clients" id="liveClientsBlock">
                <span class="live-dot" id="liveDot" aria-hidden="true"></span>
                <span class="live-count" id="liveClients">0</span>
                <span class="live-label">connected</span>
            </div>
        </header>

        <section>
            <h2>uptime</h2>
            <div class="value" id="uptimeDetail">0d 0h 0m 0s</div>
        </section>

        <section>
            <h2>connections</h2>
            <table>
                <tr>
                    <td>total sessions</td>
                    <td id="totalConnections">0</td>
                </tr>
            </table>
        </section>

        <section>
            <h2>throughput</h2>
            <canvas id="throughputGraph" width="580" height="120"></canvas>
        </section>

        <section>
            <h2>storage</h2>
            <div class="value" id="storageUsed">0 B</div>
            <table>
                <tr>
                    <td>backend</td>
                    <td id="storageBackend">sqlite</td>
                </tr>
                <tr>
                    <td>graph nodes</td>
                    <td id="graphNodes">0</td>
                </tr>
                <tr>
                    <td>limit</td>
                    <td id="storageLimit">10 GB</td>
                </tr>
            </table>
        </section>

        <footer>
            <span id="lastUpdated">-</span>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>

</html>
