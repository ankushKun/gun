<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gun.js stats</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <a href="https://github.com/ankushKun/gun" class="github-corner" aria-label="View source on GitHub" target="_blank" rel="noopener noreferrer">
        <svg width="80" height="80" viewBox="0 0 250 250" aria-hidden="true">
            <g transform="translate(250,0) scale(-1,1)">
                <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
                <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" class="octo-arm"></path>
                <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
            </g>
        </svg>
    </a>
    <div class="container">
        <header>
            <div class="header-row">
                <h1>gun.js peer</h1>
                <div class="header-status">
                    <div class="status-chip" id="statusChip">
                        <span class="status-value" id="statusText">offline</span>
                    </div>
                    <div class="status-chip" id="liveClientsBlock">
                        <span class="status-value" id="liveClients">0</span>
                        <span class="status-label">connected</span>
                    </div>
                </div>
            </div>
        </header>

        <section>
            <h2>uptime</h2>
            <div class="value" id="uptimeDetail">0d 0h 0m 0s</div>
        </section>

        <section>
            <h2>connections</h2>
            <table>
                <tr>
                    <td>total sessions</td>
                    <td id="totalConnections">0</td>
                </tr>
            </table>
        </section>

        <section>
            <h2>throughput</h2>
            <canvas id="throughputGraph"></canvas>
        </section>

        <section>
            <h2>mesh peers</h2>
            <p class="section-note">Add a peer — the worker connects automatically and syncs new graph writes both ways (no manual reconnect).</p>
            <form class="peer-form" id="peerForm">
                <div class="peer-add-row">
                    <input type="url" id="peerUrlInput" placeholder="https://relay.example.com/gun" spellcheck="false" autocomplete="off" required>
                    <button type="submit" id="peerAddBtn">add</button>
                </div>
            </form>
            <p id="peerFormMsg" class="peer-msg"></p>
            <p id="meshSyncStatus" class="mesh-status"></p>
            <ul id="peerList" class="peer-list"></ul>
        </section>

        <section>
            <h2>storage</h2>
            <div class="value" id="storageUsed">0 B</div>
            <table>
                <tr>
                    <td>backend</td>
                    <td id="storageBackend">sqlite</td>
                </tr>
                <tr>
                    <td>graph nodes</td>
                    <td id="graphNodes">0</td>
                </tr>
                <tr>
                    <td>limit</td>
                    <td id="storageLimit">10 GB</td>
                </tr>
            </table>
            <p class="section-note" id="storageEvictionNote"></p>
        </section>

        <footer>
            <span id="lastUpdated">-</span>
        </footer>
    </div>

    <script src="/app.js"></script>
    <script src="/peers.js"></script>
</body>

</html>
